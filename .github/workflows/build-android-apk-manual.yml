name: Build Android APK (Manual)
run-name: 📱 OpenClaw-Android11+-arm64-v8a-Slim-APK (Triggered by ${{ github.actor }})

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/android/**'

jobs:
  build:
    name: Build Android 11+ arm64-v8a Slim APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x apps/android/gradlew

      - name: Generate Build Metadata
        id: build_meta
        run: |
          BUILD_TIME=$(date -u +'%Y-%m-%d_%H-%M-%S_UTC')
          BUILD_DATE=$(date -u +'%Y%m%d_%H%M%S')
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Build ThirdParty Debug APK (arm64-v8a)
        run: |
          cd apps/android
          ./gradlew :app:assembleThirdPartyDebug --no-daemon

      - name: Prepare Single APK Output
        run: |
          mkdir -p apps/android/dist
          find apps/android/app/build/outputs/apk/thirdParty/debug/ -maxdepth 1 -name "*.apk" ! -name "OpenClaw-*" -exec cp {} "apps/android/dist/OpenClaw-Android11+-arm64-v8a-ThirdPartyDebug-${BUILD_TIME}.apk" \;

      - name: Upload Single APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Android11+-arm64-v8a-Slim-${{ steps.build_meta.outputs.BUILD_DATE }}
          path: apps/android/dist/*.apk
          retention-days: 30

      - name: Write Build Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 📱 OpenClaw Android 高通 64位精简瘦身版 APK 编译完成

          | 配置项 | 详细说明 |
          | :--- | :--- |
          | **应用版本** | ThirdParty Debug (全功能独立应用) |
          | **最低系统要求** | **Android 11.0+** (API Level 30+, 已修复 KeyStore 兼容性) |
          | **CPU 架构** | **`arm64-v8a` 专属高通精简版** (体积大幅缩减至约 28MB) |
          | **包含原生权限** | 相机, 定位, 后台通知, 语音唤醒, 扫码等全套权限 |
          | **编译完成时间** | \`${BUILD_TIME}\` |
          EOF
